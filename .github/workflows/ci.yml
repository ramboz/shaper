name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python3 -m unittest discover -s tests

      - name: Check Python syntax
        run: >
          python3 scripts/check_python_syntax.py
          scripts/build_host_packages.py
          scripts/build_release_zip.py
          scripts/validate_manifests.py
          skills/shape-release/scripts/shape_release.py
          skills/cutline/scripts/cutline.py
          skills/release-slate/scripts/release_slate.py
          skills/scope-audit/scripts/scope_audit.py
          tests/test_hybrid_plugin_baseline.py
          tests/test_release_plan_handoff.py
          tests/test_release_ci_gate.py
          tests/test_release_archives.py
          tests/test_release_slate.py
          tests/test_scope_audit.py

      - name: Validate manifests
        run: python3 scripts/validate_manifests.py

      - name: Check host package drift
        run: python3 scripts/build_host_packages.py --check

      - name: Check spec status board drift
        run: |
          python3 .codex/skills/jig-spec-workflow/workflow.py status-board .
          git diff --exit-code docs/specs/README.md
